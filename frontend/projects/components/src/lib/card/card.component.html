<mat-card appearance="outlined" class="card" [attr.data-testid]="testid">
  @if (title) {
    <mat-card-header class="card__header">
      <mat-card-title class="card__title">{{ title }}</mat-card-title>
    </mat-card-header>
  }
  <mat-card-content class="card__body">
    <ng-content></ng-content>
  </mat-card-content>
</mat-card>
