<!--
  Angular content projection happens once when the component is created — the
  projected nodes get attached to the FIRST <ng-content> the compiler sees.
  Repeating <ng-content> inside @switch branches only fills one branch (and
  the wrong one if the active variant changes), so we declare the projected
  label once in an <ng-template> and stamp it via ngTemplateOutlet inside
  each branch. See bug 024.
-->
<ng-template #label><ng-content></ng-content></ng-template>

@switch (variant) {
  @case ('outlined') {
    <button
      mat-stroked-button
      [type]="type"
      [disabled]="disabled || loading"
      [attr.data-testid]="testid"
      class="button button--outlined"
    >
      @if (loading) {
        <mat-spinner class="button__spinner" diameter="18"></mat-spinner>
      }
      <ng-container *ngTemplateOutlet="label"></ng-container>
    </button>
  }
  @case ('text') {
    <button
      mat-button
      [type]="type"
      [disabled]="disabled || loading"
      [attr.data-testid]="testid"
      class="button button--text"
    >
      @if (loading) {
        <mat-spinner class="button__spinner" diameter="18"></mat-spinner>
      }
      <ng-container *ngTemplateOutlet="label"></ng-container>
    </button>
  }
  @default {
    <button
      mat-flat-button
      [type]="type"
      [disabled]="disabled || loading"
      [attr.data-testid]="testid"
      class="button button--filled"
    >
      @if (loading) {
        <mat-spinner class="button__spinner" diameter="18"></mat-spinner>
      }
      <ng-container *ngTemplateOutlet="label"></ng-container>
    </button>
  }
}
