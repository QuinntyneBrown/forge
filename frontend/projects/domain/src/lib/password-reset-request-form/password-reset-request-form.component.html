<forge-card title="Reset your password">
  @if (!submitted()) {
    <form class="password-reset-request-form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <p class="password-reset-request-form__copy">
        Enter the email on your account. We'll send a reset link if it matches a Forge Fit account.
      </p>

      <mat-form-field appearance="outline" class="password-reset-request-form__field">
        <mat-label>Email</mat-label>
        <input
          matInput
          type="email"
          formControlName="email"
          autocomplete="email"
          data-testid="password-reset-request-email"
        />
      </mat-form-field>

      <forge-button
        class="password-reset-request-form__submit"
        variant="filled"
        type="submit"
        [disabled]="form.invalid"
        [loading]="submitting()"
        testid="password-reset-request-submit"
      >
        {{ submitting() ? 'Sending…' : 'Send reset link' }}
      </forge-button>
    </form>
  } @else {
    <p
      class="password-reset-request-form__confirmation"
      data-testid="password-reset-request-confirmation"
    >
      If an account exists for that email, a reset link is on its way. Check your inbox.
    </p>
  }
</forge-card>
