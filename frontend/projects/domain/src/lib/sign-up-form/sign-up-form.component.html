<forge-card title="Create your Forge Fit account">
  <form class="sign-up-form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="outline" class="sign-up-form__field">
      <mat-label>First name</mat-label>
      <input
        matInput
        type="text"
        formControlName="firstName"
        autocomplete="given-name"
        data-testid="sign-up-first-name"
      />
    </mat-form-field>

    <mat-form-field appearance="outline" class="sign-up-form__field">
      <mat-label>Last name</mat-label>
      <input
        matInput
        type="text"
        formControlName="lastName"
        autocomplete="family-name"
        data-testid="sign-up-last-name"
      />
    </mat-form-field>

    <mat-form-field appearance="outline" class="sign-up-form__field">
      <mat-label>Email</mat-label>
      <input
        matInput
        type="email"
        formControlName="email"
        autocomplete="email"
        data-testid="sign-up-email"
      />
    </mat-form-field>

    <mat-form-field appearance="outline" class="sign-up-form__field">
      <mat-label>Password</mat-label>
      <input
        matInput
        type="password"
        formControlName="password"
        autocomplete="new-password"
        data-testid="sign-up-password"
      />
      <mat-hint>At least 12 characters with upper, lower, digit, and a symbol.</mat-hint>
    </mat-form-field>

    @if (errorMessage) {
      <p class="sign-up-form__error" data-testid="sign-up-error">{{ errorMessage }}</p>
    }

    <forge-button
      class="sign-up-form__submit"
      variant="filled"
      type="submit"
      [disabled]="form.invalid"
      [loading]="submitting"
      testid="sign-up-submit"
    >
      {{ submitting ? 'Creating account…' : 'Create account' }}
    </forge-button>
  </form>
</forge-card>
