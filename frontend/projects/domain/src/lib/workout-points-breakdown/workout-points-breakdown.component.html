<forge-card class="workout-points-breakdown" testid="workout-points-breakdown">
  <div class="workout-points-breakdown__inner">
    <h3 class="workout-points-breakdown__title">Points</h3>
    @if (rows().length === 0) {
      <p class="workout-points-breakdown__empty" data-testid="workout-points-breakdown-empty">
        No session selected.
      </p>
    } @else {
      <ul class="workout-points-breakdown__rows" data-testid="workout-points-breakdown-rows">
        @for (row of rows(); track row.reason) {
          <li
            class="workout-points-breakdown__row"
            data-testid="workout-points-breakdown-row"
          >
            <span class="workout-points-breakdown__row-icon" aria-hidden="true">
              <span class="material-icons">{{ row.icon }}</span>
            </span>
            <span class="workout-points-breakdown__row-main">
              <span class="workout-points-breakdown__row-reason">{{ row.reason }}</span>
              <span class="workout-points-breakdown__row-description">{{ row.description }}</span>
            </span>
            <span class="workout-points-breakdown__row-points">+{{ row.points }}</span>
          </li>
        }
      </ul>
      <div
        class="workout-points-breakdown__total-pill"
        data-testid="workout-points-breakdown-total-pill"
      >
        <span class="workout-points-breakdown__total-pill-label">Total earned</span>
        <span class="workout-points-breakdown__total-pill-value" data-testid="workout-points-breakdown-total">
          +{{ total() }} pts
        </span>
      </div>
    }
  </div>
</forge-card>
