<forge-card title="Sign in to Forge Fit">
  <form class="sign-in-form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <label class="sign-in-form__field">
      <span class="sign-in-form__label">Email</span>
      <input
        class="sign-in-form__input"
        type="email"
        formControlName="email"
        autocomplete="email"
        data-testid="sign-in-email"
      />
    </label>

    <label class="sign-in-form__field">
      <span class="sign-in-form__label">Password</span>
      <div class="sign-in-form__password">
        <input
          class="sign-in-form__input sign-in-form__input--password"
          [type]="showPassword() ? 'text' : 'password'"
          formControlName="password"
          autocomplete="current-password"
          data-testid="sign-in-password"
        />
        <button
          type="button"
          class="sign-in-form__password-toggle"
          [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
          [attr.aria-pressed]="showPassword()"
          (click)="toggleShowPassword()"
          data-testid="sign-in-show-password"
        >
          <span class="material-icons" aria-hidden="true">{{ showPassword() ? 'visibility_off' : 'visibility' }}</span>
        </button>
      </div>
    </label>

    <div class="sign-in-form__row">
      <forge-checkbox
        class="sign-in-form__remember"
        [checked]="rememberMe()"
        (checkedChange)="onRememberMeChange($event)"
        testid="sign-in-remember-me"
      >
        Remember me
      </forge-checkbox>

      <a
        class="sign-in-form__forgot"
        routerLink="/password-reset"
        data-testid="sign-in-forgot-password"
      >
        Forgot password?
      </a>
    </div>

    @if (errorMessage()) {
      <p class="sign-in-form__error" data-testid="sign-in-error">{{ errorMessage() }}</p>
    }

    <forge-button
      class="sign-in-form__submit"
      variant="filled"
      type="submit"
      [disabled]="form.invalid"
      [loading]="submitting()"
      testid="sign-in-submit"
    >
      {{ submitting() ? 'Signing in…' : 'Sign in' }}
    </forge-button>
  </form>
</forge-card>
