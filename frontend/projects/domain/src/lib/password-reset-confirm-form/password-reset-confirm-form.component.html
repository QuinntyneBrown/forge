<forge-card title="Choose a new password">
  <form class="password-reset-confirm-form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <p class="password-reset-confirm-form__copy">
      Pick a strong new password. After saving, sign in with the new credentials.
    </p>

    <mat-form-field appearance="outline" class="password-reset-confirm-form__field">
      <mat-label>New password</mat-label>
      <input
        matInput
        type="password"
        formControlName="newPassword"
        autocomplete="new-password"
        data-testid="password-reset-confirm-new-password"
      />
      <mat-hint>At least 12 characters with upper, lower, digit, and a symbol.</mat-hint>
    </mat-form-field>

    @if (errorMessage()) {
      <p
        class="password-reset-confirm-form__error"
        data-testid="password-reset-confirm-error"
      >
        {{ errorMessage() }}
      </p>
    }

    <forge-button
      class="password-reset-confirm-form__submit"
      variant="filled"
      type="submit"
      [disabled]="form.invalid"
      [loading]="submitting()"
      testid="password-reset-confirm-submit"
    >
      {{ submitting() ? 'Saving…' : 'Save new password' }}
    </forge-button>
  </form>
</forge-card>
