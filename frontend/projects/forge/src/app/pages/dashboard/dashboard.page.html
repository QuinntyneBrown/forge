<forge-app-shell [destinations]="destinations">
  <main class="dashboard">
    <header class="dashboard__header">
      <div>
        <h1 class="dashboard__title">Dashboard</h1>
        <p class="dashboard__greeting" data-testid="dashboard-greeting">
          Signed in as <strong>{{ email() }}</strong> ({{ role() }})
        </p>
      </div>
      <button class="dashboard__sign-out" type="button" (click)="signOut()" data-testid="sign-out">
        Sign out
      </button>
    </header>

    <section class="dashboard__grid">
      <forge-daily-ring-card class="dashboard__cell dashboard__cell--span-2"></forge-daily-ring-card>
      <forge-streak-card></forge-streak-card>
      <forge-weight-progress-card></forge-weight-progress-card>
      <forge-tier-card></forge-tier-card>
      <forge-leaderboard-card class="dashboard__cell dashboard__cell--span-2"></forge-leaderboard-card>
    </section>
  </main>
</forge-app-shell>
