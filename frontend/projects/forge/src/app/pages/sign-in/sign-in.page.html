<main class="sign-in-page">
  <header class="sign-in-page__hero">
    <span class="sign-in-page__brand-mark">F</span>
    <h1 class="sign-in-page__title">Welcome back.</h1>
    <p class="sign-in-page__subtitle">
      Lock in your morning workout, beat your streak, and keep the night-eating window closed.
    </p>
  </header>

  <section class="sign-in-page__card">
    <forge-sign-in-form (signedIn)="onSignedIn($event)"></forge-sign-in-form>
  </section>

  <footer class="sign-in-page__footer">
    New to Forge Fit?
    <a class="sign-in-page__sign-up-link" routerLink="/sign-up" data-testid="sign-in-sign-up-link">Create an account</a>
  </footer>
</main>
