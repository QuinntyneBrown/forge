<main class="password-reset-page">
  <header class="password-reset-page__hero">
    <span class="password-reset-page__brand-mark">F</span>
    @if (mode() === 'confirm') {
      <h1 class="password-reset-page__title">Pick a new password.</h1>
      <p class="password-reset-page__subtitle">
        Sign in with the new password as soon as it's saved.
      </p>
    } @else {
      <h1 class="password-reset-page__title">Forgot your password?</h1>
      <p class="password-reset-page__subtitle">
        Send yourself a one-time link and pick a new one. The link expires in 30 minutes.
      </p>
    }
  </header>

  <section class="password-reset-page__card">
    @if (mode() === 'confirm') {
      <forge-password-reset-confirm-form
        [token]="token()"
        (confirmed)="onConfirmed()"
      ></forge-password-reset-confirm-form>
    } @else {
      <forge-password-reset-request-form></forge-password-reset-request-form>
    }
  </section>
</main>
