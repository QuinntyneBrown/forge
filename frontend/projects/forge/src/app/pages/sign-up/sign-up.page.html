<main class="sign-up-page">
  <header class="sign-up-page__hero">
    <span class="sign-up-page__brand-mark">F</span>
    <h1 class="sign-up-page__title">Forge your routine.</h1>
    <p class="sign-up-page__subtitle">
      Gamify the gym, lock in your morning workouts, and chase 1,500 active calories a day.
    </p>

    <ul class="sign-up-page__perks" data-testid="sign-up-hero-perks">
      <li class="sign-up-page__perk" data-testid="sign-up-hero-perk">
        <span class="material-icons" aria-hidden="true">monitor_weight</span>
        -20 lb / month target
      </li>
      <li class="sign-up-page__perk" data-testid="sign-up-hero-perk">
        <span class="material-icons" aria-hidden="true">local_fire_department</span>
        1,500 active calories per day
      </li>
      <li class="sign-up-page__perk" data-testid="sign-up-hero-perk">
        <span class="material-icons" aria-hidden="true">workspace_premium</span>
        Earn points for every session
      </li>
    </ul>
  </header>

  <section class="sign-up-page__card">
    <forge-sign-up-form (signedUp)="onSignedUp($event)"></forge-sign-up-form>
  </section>
</main>
