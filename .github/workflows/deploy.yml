name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: 9.0.x
  NODE_VERSION: 20
  AZURE_API_APP: app-forgefit-api-prod
  SWA_APP_LOCATION: frontend
  SWA_OUTPUT_LOCATION: dist/forge/browser

jobs:
  api:
    name: deploy api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore + build
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore

      - name: Publish
        run: |
          dotnet publish src/Forge.Api/Forge.Api.csproj \
            --configuration Release \
            --no-build \
            --output ../api-publish

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_API_APP }}
          package: ./api-publish

  web:
    name: deploy web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ env.SWA_APP_LOCATION }}
          output_location: ${{ env.SWA_OUTPUT_LOCATION }}
          skip_app_build: true
