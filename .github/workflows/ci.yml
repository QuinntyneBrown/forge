name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (build, test, dep audit)
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: 'Forge_CI_Password_2026!'
        ports:
          - 1433:1433
    env:
      FORGE_ACCEPTANCE_SQLSERVER: 'Server=localhost,1433;User Id=sa;Password=Forge_CI_Password_2026!;TrustServerCertificate=True'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Wait for SQL Server
        shell: bash
        run: |
          for i in {1..60}; do
            if timeout 1 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/1433'; then
              sleep 10
              exit 0
            fi
            sleep 2
          done
          echo "SQL Server did not become reachable on port 1433."
          exit 1

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "console;verbosity=minimal"

      - name: Vulnerable package scan (fail on high/critical)
        shell: pwsh
        run: |
          $output = dotnet list package --vulnerable --include-transitive 2>&1 | Out-String
          Write-Host $output
          if ($output -match "(?i)high|critical") {
            Write-Error "High or critical vulnerable dependency detected. See output above."
            exit 1
          }

  frontend:
    name: frontend (lint, test, audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (libraries + app)
        run: npm run build --if-present

      - name: Audit (high+ severity fails the job)
        run: npm audit --omit=dev --audit-level=high
