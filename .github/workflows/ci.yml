name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (build, test, dep audit)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "console;verbosity=minimal"

      - name: Vulnerable package scan (fail on high/critical)
        shell: pwsh
        run: |
          $output = dotnet list package --vulnerable --include-transitive 2>&1 | Out-String
          Write-Host $output
          if ($output -match "(?i)high|critical") {
            Write-Error "High or critical vulnerable dependency detected. See output above."
            exit 1
          }

  frontend:
    name: frontend (lint, test, audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (libraries + app)
        run: npm run build --if-present

      - name: Audit (high+ severity fails the job)
        run: npm audit --omit=dev --audit-level=high
